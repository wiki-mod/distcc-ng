name: Package release

on:
  workflow_dispatch:
    inputs:
      publish_container:
        description: "Build (and push) the container image even without a real release tag, for testing"
        type: boolean
        default: false
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag_name: ${{ steps.meta.outputs.tag_name }}
      release_title: ${{ steps.meta.outputs.release_title }}
      image_base: ${{ steps.meta.outputs.image_base }}
      do_container: ${{ steps.meta.outputs.do_container }}
    steps:
      - name: Derive release metadata
        id: meta
        shell: bash
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            version="${GITHUB_REF_NAME#v}"
            release_title="distcc-ng ${GITHUB_REF_NAME}"
          else
            version="manual-${GITHUB_RUN_NUMBER}"
            release_title="distcc-ng manual-${GITHUB_RUN_NUMBER}"
          fi
          printf 'version=%s\n' "${version}" >> "${GITHUB_OUTPUT}"
          printf 'tag_name=%s\n' "${GITHUB_REF_NAME}" >> "${GITHUB_OUTPUT}"
          printf 'release_title=%s\n' "${release_title}" >> "${GITHUB_OUTPUT}"
          printf 'image_base=ghcr.io/%s/distcc-ng:%s\n' "${GITHUB_REPOSITORY_OWNER}" "${version}" >> "${GITHUB_OUTPUT}"
          if [ "${GITHUB_REF_TYPE}" = "tag" ] || [ "${{ inputs.publish_container }}" = "true" ]; then
            printf 'do_container=true\n' >> "${GITHUB_OUTPUT}"
          else
            printf 'do_container=false\n' >> "${GITHUB_OUTPUT}"
          fi

  build_packages:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: ConorMacBride/install-package@v1
        with:
          apt: autoconf automake build-essential elfutils fakeroot libpopt-dev pkg-config python3-dev python3-setuptools rpm alien

      - name: Build release packages
        shell: bash
        run: |
          ./scripts/build-release-packages.sh

      - name: Generate build attestation
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: |
            distcc-*.tar.gz
            distcc-*.tar.bz2
            packaging/*.rpm
            packaging/*.deb

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: distcc-release-packages-${{ needs.setup.outputs.version }}
          path: |
            distcc-*.tar.gz
            distcc-*.tar.bz2
            packaging/*.rpm
            packaging/*.deb

  build_container:
    needs: setup
    if: needs.setup.outputs.do_container == 'true'
    strategy:
      matrix:
        include:
          # amd64 is required; arm64 is best-effort, on GitHub's free
          # native arm64 public-repo runners -- no QEMU emulation needed,
          # each leg builds natively for its own architecture.
          - platform: amd64
            runs_on: ubuntu-latest
          - platform: arm64
            runs_on: ubuntu-24.04-arm
      fail-fast: false
    runs-on: ${{ matrix.runs_on }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        shell: bash
        run: |
          printf '%s\n' "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push ${{ matrix.platform }} image
        shell: bash
        env:
          IMAGE_TAG: ${{ needs.setup.outputs.image_base }}-${{ matrix.platform }}
          VERSION_LABEL: ${{ needs.setup.outputs.version }}
          VCS_REF: ${{ github.sha }}
        run: |
          docker build \
            --platform "linux/${{ matrix.platform }}" \
            --file docker/release/Dockerfile \
            --build-arg "VCS_REF=${VCS_REF}" \
            --build-arg "VERSION=${VERSION_LABEL}" \
            --tag "${IMAGE_TAG}" \
            .
          docker push "${IMAGE_TAG}"

  publish_manifest:
    needs: [setup, build_container]
    if: needs.setup.outputs.do_container == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GHCR
        shell: bash
        run: |
          printf '%s\n' "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Create multi-arch manifest
        shell: bash
        env:
          IMAGE_BASE: ${{ needs.setup.outputs.image_base }}
        run: |
          docker buildx imagetools create \
            --tag "${IMAGE_BASE}" \
            "${IMAGE_BASE}-amd64" \
            "${IMAGE_BASE}-arm64"

  publish_github_release:
    needs: [setup, build_packages, publish_manifest]
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: distcc-release-packages-${{ needs.setup.outputs.version }}

      - name: Publish GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          IMAGE_TAG: ${{ needs.setup.outputs.image_base }}
          RELEASE_TITLE: ${{ needs.setup.outputs.release_title }}
          TAG_NAME: ${{ needs.setup.outputs.tag_name }}
        run: |
          shopt -s nullglob
          assets=(distcc-*.tar.gz distcc-*.tar.bz2 packaging/*.rpm packaging/*.deb)

          notes_file="$(mktemp)"
          {
            printf '%s\n\n' "${RELEASE_TITLE}"
            printf 'See CHANGELOG.md for the full list of changes in this release.\n\n'
            printf 'Source commit: %s\n' "${GITHUB_SHA}"
            printf 'Tag: %s\n\n' "${TAG_NAME}"
            printf 'Container image: %s\n' "${IMAGE_TAG}"
          } > "${notes_file}"

          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            gh release upload "${TAG_NAME}" "${assets[@]}" --clobber
            gh release edit "${TAG_NAME}" --title "${RELEASE_TITLE}" --notes-file "${notes_file}" --latest
          else
            gh release create "${TAG_NAME}" "${assets[@]}" --title "${RELEASE_TITLE}" --notes-file "${notes_file}" --latest
          fi
