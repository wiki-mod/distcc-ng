# git-cliff configuration for distcc-ng
# Tool: Structured, template-driven changelog generation
# https://github.com/orhun/git-cliff
#
# This configuration uses git-cliff to assist with CHANGELOG.md maintenance
# by automatically generating entries from git commits (including full commit body
# text for narrative context) while preserving the Keep a Changelog format.
# Run this tool manually before releases to refresh the [Unreleased] section.
#
# Workflow: Developers make commits with narrative bodies → run git-cliff before
# release → review/enhance auto-generated entries → commit & tag release.
#
# Key improvement over git-changelog: git-cliff exposes commit.body in its Tera
# template context, so the full "why" narrative is captured, not just the subject.

[changelog]
# Header: displayed at the top of every generated section
header = """
# Changelog

All notable changes to distcc-ng will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/).
Versioning continues distcc's own numbering (currently based on distcc 3.4),
with a `<version>-NG` suffix marking this fork's own releases.
See `doc/release-versioning.md` for the full versioning and release process.

"""

# Body: Tera template for rendering each version section and its commits
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}

    {% for commit in commits %}
        - **{{ commit.message | upper_first | trim }}**\
            {% if commit.remote.pr_number %} (#{{ commit.remote.pr_number }}){% endif %}
        {% if commit.body %}\
          {% for line in commit.body | split(pat="\n") %}
            {% set trimmed = line | trim %}\
            {% if trimmed | length > 0 %}  {{ trimmed }}
            {% endif %}\
          {% endfor %}\
        {% endif %}
    {% endfor %}
{% endfor %}

"""

# Trim: strip leading/trailing whitespace from body
trim = true

# Footer: displayed at the end of every generated section (empty for now)
footer = ""

# Postprocessors: additional text transformations after template rendering
postprocessors = []

[git]
# Conventional Commits settings: this repo does not use feat:/fix: prefixes
conventional_commits = false
filter_unconventional = false
split_commits = false

# Commit preprocessors: regex-based cleanup BEFORE parsing
# - Remove (cherry picked from commit <sha>) noise lines (zstd recovery artifact)
# - Remove trailing separator lines (squash-merge artifact from GitHub)
#   Note: multiline mode (?m) required so ^/$ match per-line, not string boundaries
# - Remove Co-authored-by and Signed-off-by trailers (already available structured)
commit_preprocessors = [
  { pattern = "\\(cherry picked from commit [a-f0-9]+\\)", replace = "" },
  { pattern = "(?m)^-{5,}$", replace = "" },
  { pattern = "(?m)^Co-authored-by:.*$", replace = "" },
  { pattern = "(?m)^Signed-off-by:.*$", replace = "" }
]

# Commit parsers: keyword-based grouping (not Conventional Commits)
# Security-flavored commits get dedicated "Security" group
commit_parsers = [
  { message = "^(?i)(security|traversal|vulnerab|fix.*(?:security|traversal|cve))", group = "Security" },
  { message = "^(?i)fix", group = "Fixed" },
  { message = "^(?i)add", group = "Added" },
  { message = "^(?i)(change|update|bump)", group = "Changed" },
  { message = "^(?i)remove", group = "Removed" },
  { message = ".*", group = "Other" }
]

# Filter: do not skip any commits based on default Conventional Commits rules
filter_commits = false

# Tag pattern: match version tags (v3.5.1, 3.5.1-NG, etc.)
tag_pattern = "^v?[0-9]+\\.[0-9]+.*"

# Topological ordering: not needed; sorting by commit date is fine
topo_order = false

# Commit sorting: oldest first (matches the Keep a Changelog convention)
sort_commits = "oldest"
