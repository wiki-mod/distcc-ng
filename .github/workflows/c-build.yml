name: C build

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  # Restricted to the two long-lived branches: without this filter, pushing
  # a commit to an in-repo PR branch (dev/issueNN_...) fired this AND
  # pull_request's own synchronize event for the same commit, running the
  # full matrix build + E2E job twice per commit (found via a lancache-ng
  # CI-cost comparison, 2026-07-16). pull_request stays unfiltered by
  # branch -- that's the one meant to cover every PR commit.
  push:
    branches:
      - current_dev
      - master
    paths-ignore:
      - '**/*.md'
      - 'doc/**'
  pull_request:
    paths-ignore:
      - '**/*.md'
      - 'doc/**'
  # Lets us check a branch's build health on demand (e.g. current_dev or
  # master) without needing a new commit/PR to trigger CI.
  workflow_dispatch:
  # Nightly health check on current_dev, so a break doesn't sit silently
  # until the next PR happens to touch that branch.
  schedule:
    - cron: '0 3 * * *'

jobs:
  make_check:
    strategy:
      matrix:
        os:
        - macOS-latest
        - ubuntu-latest
      fail-fast: false
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    # id-token/attestations are needed for actions/attest-build-provenance
    # below (Linux only for now); contents:read is the default we'd
    # otherwise lose by declaring this block at all.
    permissions:
      contents: read
      id-token: write
      attestations: write
    # ccache's own default cache_dir differs by platform (~/.cache/ccache
    # on Linux, ~/Library/Caches/ccache on macOS) -- pin it explicitly so
    # the actions/cache path below is right on both matrix legs.
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache-dir
    steps:
      # Trial run (#58): audit-only egress monitoring, does not block any
      # traffic yet. Must be the very first step -- it can't retroactively
      # cover network calls made by steps that already ran.
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@v7
        with:
          # schedule always evaluates using the default branch (master);
          # redirect the nightly run to current_dev instead of re-checking
          # master, which push/pull_request already cover on every change.
          ref: ${{ github.event_name == 'schedule' && 'current_dev' || github.ref }}
      - uses: ConorMacBride/install-package@v1
        with:
          # Note: aclocal is packaged with automake in Homebrew, so we need it
          # even though we don't use automake.
          brew: autoconf automake popt python@3.13 python-setuptools ccache zstd
          # Note: no gdb on macOS because it's apparently not supported on arm64
          apt: clang libavahi-client-dev libpopt-dev gdb python3-dev python3-setuptools ccache libzstd-dev
          # brew-cask: TODO
          # choco: TODO
      - run: which python3.13 || which python3
      # Cache ccache's own object cache, not distcc's source -- content-
      # addressed, so a stale/missing cache never produces wrong results,
      # only a slower build. Rolling key: always restore the latest for
      # this OS, always save a new one (actions/cache no-ops a save on an
      # exact key collision, so bumping github.run_id into the key avoids
      # that and keeps the cache warm across runs).
      - uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ matrix.os }}-${{ github.run_id }}
          restore-keys: |
            ccache-${{ matrix.os }}-
      # Cache autoconf/aclocal's macro-trace cache (autom4te.cache, produced
      # by ./autogen.sh's aclocal/autoheader/autoconf calls). Safe to restore
      # even when stale -- like ccache above, it's content-checked, not
      # blindly trusted wholesale: autom4te itself invalidates an individual
      # cached macro trace when the corresponding m4 input changed, so a
      # stale/mismatched entry only costs re-deriving that one trace, never a
      # wrong configure script. (Unlike config.cache, which is NOT used here:
      # its ac_cv_* entries are blindly trusted by ./configure once cached,
      # and they encode dependency-detection results -- e.g. does libpopt/
      # libzstd/avahi have a given header/symbol -- that can change when
      # ConorMacBride/install-package or the runner image bumps a library
      # version without configure.ac itself changing, which a
      # configure.ac-only cache key would never invalidate. Caching it would
      # risk silently reusing wrong dependency-detection results.) Key on the
      # actual autoconf inputs so a real configure.ac/m4 change still gets a
      # fresh (initially empty) cache instead of reusing pre-change traces.
      - uses: actions/cache@v4
        with:
          path: autom4te.cache
          key: autoconf-${{ matrix.os }}-${{ hashFiles('configure.ac', 'm4/*.m4') }}
          restore-keys: |
            autoconf-${{ matrix.os }}-
      - run: ./autogen.sh
      # python3 on macOS is 3.14, which breaks CI for unknown reasons, so we pin it back
      # CC must reference ccache by absolute path: `make check`'s
      # maintainer-check-no-set-path target runs `$(CC) --version` under a
      # restricted PATH (/usr/local/bin:/bin:/usr/bin, Makefile.in's
      # RESTRICTED_PATH) that deliberately excludes Homebrew's /opt/homebrew/bin
      # on the arm64 macOS runner -- a bare "ccache" would fail to resolve there.
      - run: ./configure CC="$(command -v ccache) cc" PYTHON="$(which python3.13 || which python3)"
      - run: make
      - run: ccache --show-stats
      - run: make check
      # Build-provenance attestation for the actual shipped binaries.
      # Linux-only for now: the OIDC-based attestation API needs the repo's
      # GitHub Actions identity, which is simplest to exercise from one
      # runner OS rather than duplicating the attestation per matrix leg.
      # Skipped on the nightly schedule: that run checks out current_dev while
      # github.sha (which the attestation records) is master's tip, so a
      # scheduled attestation would tie current_dev binaries to the wrong
      # commit. Attestation is meaningful for the push/PR builds anyway.
      - if: matrix.os == 'ubuntu-latest' && github.event_name != 'schedule'
        run: |
          mkdir -p /tmp/attest-subjects
          cp distcc distccd /tmp/attest-subjects/
      - if: matrix.os == 'ubuntu-latest' && github.event_name != 'schedule'
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: /tmp/attest-subjects/*

  # Proves the bundled-popt fallback (configure.ac, popt/) actually builds and
  # passes the test suite, not just that it's syntactically present: this
  # runner deliberately never installs libpopt-dev, so popt.pc is absent and
  # PKG_CHECK_MODULES(POPT, ...) must fail over to the bundled copy. The
  # explicit grep on configure's own notice guards against this job silently
  # turning into a no-op validation if a future base image ships popt.pc by
  # default.
  popt_fallback_build:
    name: Bundled popt fallback build (no system libpopt)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: ConorMacBride/install-package@3e7ad059e07782ee54fa35f827df52aae0626f30 # v1.1.0
        with:
          # Deliberately no libpopt-dev/libpopt0 here -- that's the point of
          # this job. pkg-config *is* installed (unlike libpopt-dev) so this
          # exercises the realistic case -- pkg-config present, popt.pc
          # simply absent -- rather than the less representative case of
          # pkg-config itself being missing. libavahi-client-dev is still
          # needed so the default zeroconf-enabled build configures the same
          # as the main matrix.
          apt: autoconf automake pkg-config libavahi-client-dev python3-dev python3-setuptools libzstd-dev
      - run: ./autogen.sh
      - name: configure (must report the bundled-popt fallback)
        run: |
          ./configure PYTHON="$(which python3)" 2>&1 | tee configure.log
          grep -q "system libpopt not found (or disabled); building bundled popt" configure.log \
            || { echo "::error::configure did not report falling back to bundled popt -- is libpopt-dev leaking in from the base image?"; exit 1; }
      - run: make
      - run: make check

  # Real distributed-compile validation: distcc-ng's own source tree is built
  # across two containers (a distccd server + a distcc client) over a bridge
  # network, in both plain and pump mode, and a distributed compile is checked
  # byte-for-byte against a local-only one. make check already exercises a
  # localhost daemon, but only this proves a compile genuinely crosses the
  # network and is not silently completed by distcc's local-fallback path.
  # Linux/docker-only, so it is a standalone job rather than a macOS matrix leg.
  distributed_e2e:
    name: Distributed compile E2E (2-container)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # Trial run (#58): audit-only egress monitoring, see the make_check
      # job's identical first step for the full rationale.
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@v7
        with:
          # Same schedule redirect as make_check: the nightly run evaluates
          # from master but must validate current_dev.
          ref: ${{ github.event_name == 'schedule' && 'current_dev' || github.ref }}
      # docker and the compose plugin are preinstalled on ubuntu-latest.
      - name: Run distributed-compile end-to-end test
        run: bash test/e2e/run-e2e.sh

