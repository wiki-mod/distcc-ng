name: Release Drafter

# Maintains an auto-updating draft GitHub Release, refreshed on every push
# to current_dev, so there's always a current, zero-effort preview of
# what's pending -- separate from CHANGELOG.md, see .github/release-drafter.yml
# for how the two relate. Also runs on pull_request events so the
# autolabeler assigns each PR's category label (bug/enhancement/security/
# documentation) as soon as it's opened, not only once merged.

on:
  push:
    branches:
      - current_dev
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: read

jobs:
  update_release_draft:
    runs-on: ubuntu-latest
    permissions:
      # Needed to create/update the draft release.
      contents: write
      # Needed for the autolabeler to assign labels to PRs.
      pull-requests: write
    steps:
      - uses: release-drafter/release-drafter@v6
        with:
          # Pinned to current_dev explicitly: release-drafter otherwise
          # resolves its config against the repo's default branch (master),
          # which doesn't carry this file -- current_dev is not the default
          # branch here (see AGENTS.md's branching model). Confirmed via a
          # real CI failure ("must reside in your default branch") before
          # adding this pin. Syntax per @probot/octokit-plugin-config: a
          # bare "filename@ref" is rejected ("extension is not support for
          # configuration") -- the leading ":" is required for the @ref
          # suffix to be recognized, resolving relative to .github/.
          config-name: ":release-drafter.yml@current_dev"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
