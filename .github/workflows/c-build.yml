name: C build

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  # Restricted to the two long-lived branches: without this filter, pushing
  # a commit to an in-repo PR branch (dev/issueNN_...) fired this AND
  # pull_request's own synchronize event for the same commit, running the
  # full matrix build twice per commit (found via a lancache-ng CI-cost
  # comparison, 2026-07-16). pull_request stays unfiltered by branch --
  # that's the one meant to cover every PR commit.
  push:
    branches:
      - current_dev
      - master
    paths-ignore:
      - '**/*.md'
      - 'doc/**'
  pull_request:
    paths-ignore:
      - '**/*.md'
      - 'doc/**'

jobs:
  make_check:
    strategy:
      matrix:
        os:
        - macOS-latest
        - ubuntu-latest
      fail-fast: false
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: ConorMacBride/install-package@v1
        with:
          # Note: aclocal is packaged with automake in Homebrew, so we need it
          # even though we don't use automake.
          brew: autoconf automake popt python@3.13 python-setuptools
          # Note: no gdb on macOS because it's apparently not supported on arm64
          apt: clang libavahi-client-dev libpopt-dev gdb python3-dev python3-setuptools
          # brew-cask: TODO
          # choco: TODO
      - run: which python3.13 || which python3
      - run: ./autogen.sh
      # python3 on macOS is 3.14, which breaks CI for unknown reasons, so we pin it back
      - run: ./configure PYTHON="$(which python3.13 || which python3)"
      - run: make
      - run: make check
