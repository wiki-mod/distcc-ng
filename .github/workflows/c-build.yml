name: C build

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  # Restricted to the two long-lived branches: without this filter, pushing
  # a commit to an in-repo PR branch (dev/issueNN_...) fired this AND
  # pull_request's own synchronize event for the same commit, running the
  # full matrix build + E2E job twice per commit (found via a lancache-ng
  # CI-cost comparison, 2026-07-16). pull_request stays unfiltered by
  # branch -- that's the one meant to cover every PR commit.
  #
  # No paths-ignore here (removed 2026-07-24, refs #267/#336): every job
  # below is required by master's branch ruleset, and a required status
  # check that never runs (because a path filter skipped its whole
  # workflow) permanently blocks merging any PR that doesn't happen to
  # touch a matching path -- confirmed live on PR #336, a README-only
  # change that could never satisfy required checks that simply never
  # started. The `changes` job below now does that filtering itself, at
  # the job level, so a doc-only PR still gets a real (skipped, not
  # missing) check-run for each required job -- GitHub treats a skipped
  # job's check-run as passing for required-status-check purposes, same
  # as this workflow's own `scan-scheduled`/`update_release_draft`-style
  # conditional jobs elsewhere in this repo's CI.
  push:
    branches:
      - current_dev
      - master
  pull_request:
  # Lets us check a branch's build health on demand (e.g. current_dev or
  # master) without needing a new commit/PR to trigger CI.
  workflow_dispatch:
  # Nightly health check on current_dev, so a break doesn't sit silently
  # until the next PR happens to touch that branch.
  schedule:
    - cron: '0 3 * * *'

# Read-only floor: every job below already declares its own job-level
# permissions block scoped to what its own steps need (id-token/attestations
# only on make_check's Linux leg, nothing beyond checkout elsewhere) -- this
# top-level block only exists so the workflow has an explicit, minimal
# default instead of silently falling back to the broader legacy
# GITHUB_TOKEN default if a future job is ever added without its own block.
permissions:
  contents: read

jobs:
  # Cheap, always-runs gate that replaces the old workflow-level
  # paths-ignore (see the `on:` block's comment above) with a per-job one:
  # every heavy job below depends on this and skips (not: never starts)
  # when only docs changed. workflow_dispatch/schedule always force a full
  # run -- those exist specifically to check real build health on demand,
  # so they must never silently no-op.
  changes:
    name: Detect relevant (non-docs) changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - id: filter
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ] || [ "$EVENT_NAME" = "schedule" ]; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
            echo "forced by $EVENT_NAME -- always runs the full build"
            exit 0
          fi
          if [ "$EVENT_NAME" = "pull_request" ]; then
            from="$BASE_SHA"
          else
            from="$BEFORE_SHA"
          fi
          # A missing/all-zero `before` (e.g. a branch's first push) can't
          # be diffed -- fail open (relevant=true) rather than silently
          # skipping required checks on an un-diffable event.
          if [ -z "$from" ] || [ "$from" = "0000000000000000000000000000000000000000" ]; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
            echo "no diffable base ($from) -- failing open"
            exit 0
          fi
          changed="$(git diff --name-only "$from" "$HEAD_SHA")"
          echo "changed files:"
          echo "$changed"
          if printf '%s\n' "$changed" | grep -qvE '\.md$|^doc/'; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
          fi

  make_check:
    needs: changes
    # No job-level `if:` here (unlike the other three gated jobs below) --
    # a matrixed job's `if:` is evaluated BEFORE the matrix is expanded, so
    # a false job-level `if:` collapses both legs into a single check-run
    # named plain "make_check", not "make_check (ubuntu-latest)"/
    # "make_check (macOS-latest)" -- the two exact context strings master's
    # ruleset requires. That means the required checks would go right back
    # to silently never existing on a docs-only PR, just one layer deeper
    # (confirmed live on PR #336, after #337/#338 had already "fixed" this
    # once). Gating every step instead keeps the matrix expansion intact --
    # both named check-runs always exist, they just skip their real work.
    strategy:
      matrix:
        os:
        - macOS-latest
        - ubuntu-latest
      fail-fast: false
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    # id-token/attestations are needed for actions/attest-build-provenance
    # below (Linux only for now); contents:read is the default we'd
    # otherwise lose by declaring this block at all.
    permissions:
      contents: read
      id-token: write
      attestations: write
    # ccache's own default cache_dir differs by platform (~/.cache/ccache
    # on Linux, ~/Library/Caches/ccache on macOS) -- pin it explicitly so
    # the actions/cache path below is right on both matrix legs.
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache-dir
    steps:
      # Trial run (#58): audit-only egress monitoring, does not block any
      # traffic yet. Must be the very first step -- it can't retroactively
      # cover network calls made by steps that already ran.
      - name: Harden Runner
        if: needs.changes.outputs.relevant == 'true'
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - if: needs.changes.outputs.relevant == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # schedule always evaluates using the default branch (master);
          # redirect the nightly run to current_dev instead of re-checking
          # master, which push/pull_request already cover on every change.
          ref: ${{ github.event_name == 'schedule' && 'current_dev' || github.ref }}
      - if: needs.changes.outputs.relevant == 'true'
        uses: ConorMacBride/install-package@3e7ad059e07782ee54fa35f827df52aae0626f30 # v1.1.0
        with:
          # Note: aclocal is packaged with automake in Homebrew, so we need it
          # even though we don't use automake.
          brew: autoconf automake popt python@3.13 python-setuptools ccache zstd
          # Note: no gdb on macOS because it's apparently not supported on arm64
          apt: clang libavahi-client-dev libpopt-dev gdb python3-dev python3-setuptools ccache libzstd-dev
          # brew-cask: TODO
          # choco: TODO
      - if: needs.changes.outputs.relevant == 'true'
        run: which python3.13 || which python3
      # Cache ccache's own object cache, not distcc's source -- content-
      # addressed, so a stale/missing cache never produces wrong results,
      # only a slower build. Rolling key: always restore the latest for
      # this OS, always save a new one (actions/cache no-ops a save on an
      # exact key collision, so bumping github.run_id into the key avoids
      # that and keeps the cache warm across runs).
      - if: needs.changes.outputs.relevant == 'true'
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ matrix.os }}-${{ github.run_id }}
          restore-keys: |
            ccache-${{ matrix.os }}-
      # Cache autoconf/aclocal's macro-trace cache (autom4te.cache, produced
      # by ./autogen.sh's aclocal/autoheader/autoconf calls). Safe to restore
      # even when stale -- like ccache above, it's content-checked, not
      # blindly trusted wholesale: autom4te itself invalidates an individual
      # cached macro trace when the corresponding m4 input changed, so a
      # stale/mismatched entry only costs re-deriving that one trace, never a
      # wrong configure script. (Unlike config.cache, which is NOT used here:
      # its ac_cv_* entries are blindly trusted by ./configure once cached,
      # and they encode dependency-detection results -- e.g. does libpopt/
      # libzstd/avahi have a given header/symbol -- that can change when
      # ConorMacBride/install-package or the runner image bumps a library
      # version without configure.ac itself changing, which a
      # configure.ac-only cache key would never invalidate. Caching it would
      # risk silently reusing wrong dependency-detection results.) Key on the
      # actual autoconf inputs so a real configure.ac/m4 change still gets a
      # fresh (initially empty) cache instead of reusing pre-change traces.
      - if: needs.changes.outputs.relevant == 'true'
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: autom4te.cache
          key: autoconf-${{ matrix.os }}-${{ hashFiles('configure.ac', 'm4/*.m4') }}
          restore-keys: |
            autoconf-${{ matrix.os }}-
      - if: needs.changes.outputs.relevant == 'true'
        run: ./autogen.sh
      # python3 on macOS is 3.14, which breaks CI for unknown reasons, so we pin it back
      # CC must reference ccache by absolute path: `make check`'s
      # maintainer-check-no-set-path target runs `$(CC) --version` under a
      # restricted PATH (/usr/local/bin:/bin:/usr/bin, Makefile.in's
      # RESTRICTED_PATH) that deliberately excludes Homebrew's /opt/homebrew/bin
      # on the arm64 macOS runner -- a bare "ccache" would fail to resolve there.
      - if: needs.changes.outputs.relevant == 'true'
        run: ./configure CC="$(command -v ccache) cc" PYTHON="$(which python3.13 || which python3)"
      - if: needs.changes.outputs.relevant == 'true'
        run: make
      - if: needs.changes.outputs.relevant == 'true'
        run: ccache --show-stats
      - if: needs.changes.outputs.relevant == 'true'
        run: make check
      # AutogroupNicenessPrivilegeDrop_Case (test/testdistcc.py) needs real
      # root to exercise dcc_discard_root()'s privilege drop -- the plain
      # `make check` above always runs as the unprivileged
      # runner user, so that one root-only case is silently NOTRUN there
      # (see test/comfychair.py's require_root()). ubuntu-latest gives real,
      # working sudo on a genuine Linux kernel (same basis issue #264's
      # container work already relies on for dcc_discard_root() coverage),
      # so run just this one case again, this time under sudo, rather than
      # re-running the whole suite as root (which would change behavior --
      # umask/permission checks, etc. -- for many unrelated, non-root-aware
      # cases). Linux-only: autogroups don't exist on macOS, and the case
      # self-skips there anyway via its own sys.platform check.
      # `single-test` depends on check_PROGRAMS, already built (non-root) by
      # `make check` above, so this does not rebuild anything as root.
      # comfychair treats a NotRunError skip as a plain exit 0, identical to
      # a real pass -- so if this ever runs on a future runner image that's
      # missing /proc/sys/kernel/sched_autogroup_enabled (or has it set to
      # 0), the step would stay green while providing zero actual coverage
      # of the root/autogroup behavior it exists to check. Capture the
      # test's own reported line and fail explicitly on a skip, rather than
      # trusting the process exit code alone.
      - if: needs.changes.outputs.relevant == 'true' && matrix.os == 'ubuntu-latest'
        run: |
          set -o pipefail
          sudo make TESTNAME=AutogroupNicenessPrivilegeDrop_Case single-test 2>&1 | tee autogroup-test.log
          if grep -q "AutogroupNicenessPrivilegeDrop_Case NOTRUN" autogroup-test.log; then
            echo "::error::AutogroupNicenessPrivilegeDrop_Case was skipped (NOTRUN) instead of actually running -- this runner is missing real root/autogroup coverage, which this step exists to guarantee. See the skip reason above."
            exit 1
          fi
          grep -q "AutogroupNicenessPrivilegeDrop_Case OK" autogroup-test.log \
            || { echo "::error::AutogroupNicenessPrivilegeDrop_Case did not report OK or NOTRUN -- unexpected output, treating as a failure."; exit 1; }
      # Build-provenance attestation for the actual shipped binaries.
      # Linux-only for now: the OIDC-based attestation API needs the repo's
      # GitHub Actions identity, which is simplest to exercise from one
      # runner OS rather than duplicating the attestation per matrix leg.
      # Skipped on the nightly schedule: that run checks out current_dev while
      # github.sha (which the attestation records) is master's tip, so a
      # scheduled attestation would tie current_dev binaries to the wrong
      # commit. Attestation is meaningful for the push/PR builds anyway.
      - if: needs.changes.outputs.relevant == 'true' && matrix.os == 'ubuntu-latest' && github.event_name != 'schedule'
        run: |
          mkdir -p /tmp/attest-subjects
          cp distcc distccd /tmp/attest-subjects/
      - if: needs.changes.outputs.relevant == 'true' && matrix.os == 'ubuntu-latest' && github.event_name != 'schedule'
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-path: /tmp/attest-subjects/*

  # Proves the bundled-popt fallback (configure.ac, popt/) actually builds and
  # passes the test suite, not just that it's syntactically present: this
  # runner deliberately never installs libpopt-dev, so popt.pc is absent and
  # PKG_CHECK_MODULES(POPT, ...) must fail over to the bundled copy. The
  # explicit grep on configure's own notice guards against this job silently
  # turning into a no-op validation if a future base image ships popt.pc by
  # default.
  popt_fallback_build:
    name: Bundled popt fallback build (no system libpopt)
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # This job only checks out and builds the tree, it doesn't need
    # anything beyond read access to the repository contents.
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ConorMacBride/install-package@3e7ad059e07782ee54fa35f827df52aae0626f30 # v1.1.0
        with:
          # Deliberately no libpopt-dev/libpopt0 here -- that's the point of
          # this job. pkg-config *is* installed (unlike libpopt-dev) so this
          # exercises the realistic case -- pkg-config present, popt.pc
          # simply absent -- rather than the less representative case of
          # pkg-config itself being missing. libavahi-client-dev is still
          # needed so the default zeroconf-enabled build configures the same
          # as the main matrix.
          apt: autoconf automake pkg-config libavahi-client-dev python3-dev python3-setuptools libzstd-dev
      - run: ./autogen.sh
      - name: configure (must report the bundled-popt fallback)
        run: |
          ./configure PYTHON="$(which python3)" 2>&1 | tee configure.log
          grep -q "system libpopt not found (or disabled); building bundled popt" configure.log \
            || { echo "::error::configure did not report falling back to bundled popt -- is libpopt-dev leaking in from the base image?"; exit 1; }
      - run: make
      - run: make check
      # Real functional smoke test of the bundled-popt-linked binary, not just
      # a successful link: --help exercises poptGetContext()/poptGetNextOpt()
      # end to end, and the option table below is a representative sample of
      # src/dopt.c's actual options[] (POPT_ARG_STRING, POPT_ARG_INT, and
      # POPT_ARG_NONE entries), so a real argInfo/argument-parsing regression
      # in the vendored popt tree would show up as missing/garbled output
      # here, not just a link failure.
      - name: Functional smoke test (distccd --help against bundled popt)
        run: |
          ./distccd --help > distccd-help.log 2>&1
          echo "--- distccd --help output ---"
          cat distccd-help.log
          for opt in '\-\-jobs' '\-\-nice' '\-\-listen' '\-\-daemon' '\-\-log-file' '\-\-allow' '\-\-user' '\-\-port'; do
            grep -qE -- "$opt" distccd-help.log \
              || { echo "::error::distccd --help (bundled popt build) is missing expected option matching '$opt'"; exit 1; }
          done

  # Popt-directory-specific regression gate (asked for after the bundled
  # popt/ tree was found to be a 20+-year-old 1.7 snapshot, see #63's
  # follow-up). This job compiles the *current* vendored popt/*.c directly
  # with gcc, independent of the full autoconf/make machinery, at this
  # project's own -Wall -Wextra -Werror plus the same -Wno-unused/
  # -Wno-unused-parameter exemption Makefile.in's popt_OBJS rule applies in
  # the real build. That exemption turned out to be load-bearing even for a
  # correctly-vendored, completely unmodified popt 1.19 tree, not just for
  # the old 1.7 snapshot: popt/popthelp.c's poptHelpOptions2 callback table
  # has intentionally-unused parameters by design, and popt/poptint.c's
  # POPT_fprintf() leaves a variable genuinely unused on the HAVE_VASPRINTF
  # code path (the normal one on glibc) -- both are inherent to popt's own
  # source, not something a regression here would introduce or remove. The
  # real regression detection this job provides is the version marker and
  # fingerprint check below: it confirms popt/POPT_VERSION and a real,
  # version-specific API symbol actually match what this repo claims to
  # ship, catching a stale/wrong vendored copy even if it happens to still
  # compile cleanly.
  popt_vendor_check:
    name: Vendored popt/ version and compile check
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Same rationale as popt_fallback_build above: read-only checkout and
    # compile, no need for the default token's write access to anything.
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Vendored version marker matches what this repo claims to ship
        run: |
          test "$(cat popt/POPT_VERSION)" = "popt-1.19-release" \
            || { echo "::error::popt/POPT_VERSION does not read 'popt-1.19-release' -- has the vendored tree been swapped without updating the marker?"; exit 1; }
          # poptJlu32lpair only exists in the real popt project's modern
          # (post-1.7) hash-table implementation (src/poptint.c upstream,
          # popt/poptint.c here) -- a real, checkable fingerprint that the
          # vendored tree is genuinely 1.19-era code, not just a renamed
          # marker file.
          grep -q "poptJlu32lpair" popt/poptint.h \
            || { echo "::error::popt/poptint.h is missing poptJlu32lpair -- vendored tree does not look like popt 1.19"; exit 1; }
          # findme.c/.h were part of the old 1.7 snapshot and were dropped
          # when vendoring 1.19 (upstream itself no longer ships them); their
          # reappearance is a sign of an accidental revert to the stale tree.
          if [ -e popt/findme.c ] || [ -e popt/findme.h ]; then
            echo "::error::popt/findme.c or popt/findme.h exist -- this looks like a reversion to the old popt 1.7 snapshot"
            exit 1
          fi
      - uses: ConorMacBride/install-package@3e7ad059e07782ee54fa35f827df52aae0626f30 # v1.1.0
        with:
          # Same package set as popt_fallback_build (no libpopt-dev, so
          # config.h ends up with the real BUILD_POPT-triggering macros this
          # job needs a genuine config.h to reflect).
          apt: autoconf automake pkg-config libavahi-client-dev python3-dev python3-setuptools libzstd-dev
      # Run the real ./configure (forced onto the bundled path) so config.h
      # reflects the actual HAVE_* results this job's compile then uses --
      # a hand-written set of -D flags here could silently drift from what
      # configure.ac really detects and stop testing the real thing.
      - run: ./autogen.sh
      - run: ./configure --without-system-popt PYTHON="$(which python3)"
      - name: Compile vendored popt/*.c under this project's own warning flags
        run: |
          set -e
          mkdir -p /tmp/popt-strict-check
          # -Wno-unused/-Wno-unused-parameter mirror Makefile.in's popt_OBJS
          # rule exactly -- see the job-level comment above for why even the
          # real, unmodified popt 1.19 source needs both.
          # -D_GNU_SOURCE, -DPOPT_SYSCONFDIR and -DPACKAGE mirror the flags
          # Makefile.in's own CPPFLAGS/popt_OBJS rule feeds every popt object
          # in the real build: without -D_GNU_SOURCE, glibc hides
          # secure_getenv()'s prototype (popt/system.h's getenv() macro, used
          # when HAVE_SECURE_GETENV is detected); POPT_SYSCONFDIR is
          # poptReadDefaultConfig()'s compiled-in system config directory;
          # PACKAGE is popt/popthelp.c's gettext translation-domain string,
          # which this fork's plain-autoconf (non-automake) configure.ac
          # never defines on its own.
          CFLAGS=(-DHAVE_CONFIG_H -D_GNU_SOURCE "-DPOPT_SYSCONFDIR=\"/usr/local/etc\"" "-DPACKAGE=\"distcc\"" -Isrc -Ipopt -Wall -Wextra -Werror -Wno-unused -Wno-unused-parameter)
          for f in popt/popt.c popt/poptconfig.c popt/popthelp.c popt/poptparse.c popt/poptint.c; do
            echo "::group::gcc ${CFLAGS[*]} -c $f"
            gcc "${CFLAGS[@]}" -c "$f" -o "/tmp/popt-strict-check/$(basename "$f").o"
            echo "::endgroup::"
          done

  # Real distributed-compile validation: distcc-ng's own source tree is built
  # across two containers (a distccd server + a distcc client) over a bridge
  # network, in both plain and pump mode, and a distributed compile is checked
  # byte-for-byte against a local-only one. make check already exercises a
  # localhost daemon, but only this proves a compile genuinely crosses the
  # network and is not silently completed by distcc's local-fallback path.
  # Linux/docker-only, so it is a standalone job rather than a macOS matrix leg.
  distributed_e2e:
    name: Distributed compile E2E (2-container)
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # This job only checks out the repo and runs a local docker-compose e2e
    # script -- it reads code and writes nothing back. Its sibling jobs in
    # this file all declare an explicit job-level block; without one here the
    # job inherited the default token scope, which CodeQL flagged
    # (actions/missing-workflow-permissions). Pin it to the minimum it needs.
    permissions:
      contents: read
    steps:
      # Trial run (#58): audit-only egress monitoring, see the make_check
      # job's identical first step for the full rationale.
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Same schedule redirect as make_check: the nightly run evaluates
          # from master but must validate current_dev.
          ref: ${{ github.event_name == 'schedule' && 'current_dev' || github.ref }}
      # docker and the compose plugin are preinstalled on ubuntu-latest.
      - name: Run distributed-compile end-to-end test
        run: bash test/e2e/run-e2e.sh

