# release-drafter config: maintains an auto-updating draft GitHub Release
# on every merge to current_dev (see .github/workflows/release-drafter.yml).
# When that draft is actually published, its body is what
# .github/workflows/changelog-update-on-release.yml inserts into
# CHANGELOG.md (via changelog-updater-action) -- so this config's
# category titles are written to match Keep a Changelog's own section
# names (Security/Fixed/Added/Documentation), not release-drafter's usual
# emoji defaults, so the synced CHANGELOG.md section reads the same as
# every hand-written section before it. (fixes #122; supersedes the
# git-cliff-based approach from #113/#118, see #122 for why)

name-template: 'v$RESOLVED_VERSION-NG'
tag-template: 'v$RESOLVED_VERSION-NG'

# $NUMBER/$TITLE/$BODY/$AUTHORS are release-drafter's own first-class
# template variables -- no regex needed, unlike the git-cliff Tera
# template this replaces.
change-template: '* #$NUMBER | $TITLE'
change-title-escapes: '\<*_&'

# PRs get sorted into these sections by label. Labels are assigned
# automatically by the autolabeler below, based on PR title keywords,
# since this repo doesn't manually label every PR by type.
categories:
  - title: 'Security'
    labels:
      - 'security'
  - title: 'Fixed'
    labels:
      - 'bug'
  - title: 'Added'
    labels:
      - 'enhancement'
  - title: 'Documentation'
    labels:
      - 'documentation'

# PRs opted out of the CHANGELOG.md requirement are opted out here too.
exclude-labels:
  - 'no-changelog-needed'

autolabeler:
  - label: 'security'
    title:
      - '/^(?i)(security|traversal|vulnerab)/'
  - label: 'bug'
    title:
      - '/^(?i)fix/'
  - label: 'enhancement'
    title:
      - '/^(?i)(add|feat)/'
  - label: 'documentation'
    title:
      - '/^(?i)doc/'
    files:
      - '*.md'
      - 'doc/**'

version-resolver:
  major:
    labels:
      - 'major'
  minor:
    labels:
      - 'enhancement'
  patch:
    labels:
      - 'bug'
      - 'security'
  default: patch

# release-drafter's own default is "## $TITLE" (H2) for category headings.
# Overridden to H3 here: changelog-update-on-release.yml's
# changelog-updater-action inserts this whole body under its own H2
# "## [tag] - date" heading, so category sub-sections need to be H3 to
# nest correctly, matching Keep a Changelog's own "### Added" style.
category-template: '### $TITLE'

template: |
  $CHANGES
