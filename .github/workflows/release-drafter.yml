name: Release Drafter

# Maintains an auto-updating draft GitHub Release, refreshed on every push
# to current_dev, so there's always a current, zero-effort preview of
# what's pending -- separate from CHANGELOG.md, see .github/release-drafter.yml
# for how the two relate. Also runs on pull_request events so the
# autolabeler assigns each PR's category label (bug/enhancement/security/
# documentation) as soon as it's opened, not only once merged.

on:
  push:
    branches:
      - current_dev
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: read

jobs:
  update_release_draft:
    runs-on: ubuntu-latest
    permissions:
      # Needed to create/update the draft release.
      contents: write
      # Needed for the autolabeler to assign labels to PRs.
      pull-requests: write
    steps:
      # Pinned to v7.5.1's commit (not the floating "v7" tag), per the
      # unpinned-third-party-action CodeQL finding. v7 (unlike v6) declares
      # `using: node24` in its own action.yml -- no more Node 20 deprecation
      # warning -- and, more importantly, its config-loading resolves
      # config-name against the *current* ref/branch automatically instead
      # of being hardcoded to the repo's default branch. That hardcoding is
      # what forced #132/#133's workaround (a duplicate .github/release-drafter.yml
      # on master); v7 doesn't need it, though the duplicate is left in place
      # as harmless redundancy rather than removed as part of this change.
      - uses: release-drafter/release-drafter@4d75298e00d9e34c483e5ff8c68d0ea1c1940c1e # v7.5.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
