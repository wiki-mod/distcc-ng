# git-changelog configuration for distcc-ng
# Tool: Automatic Changelog generator using Jinja2 templates
# https://pawamoy.github.io/git-changelog/
#
# This configuration uses git-changelog to assist with CHANGELOG.md maintenance
# by automatically generating entries from git commits while preserving the Keep
# a Changelog format. Run this tool manually before releases to refresh the
# [Unreleased] section with recent commits.
#
# Workflow: Developers make commits → run git-changelog before release →
# review/enhance auto-generated entries → commit & tag release.

[tool.git-changelog]
# Convention: "basic" handles commits without Conventional Commit prefixes
# (no "feat:", "fix:" enforcement required). Maps commit subjects to sections.
convention = "basic"

# Template: Keep a Changelog format (standard for this project)
# Built-in keepachangelog template generates markdown with version headers
template = "keepachangelog"

# In-place mode: Update existing CHANGELOG.md instead of generating new file
in-place = true

# Marker line: Insertion point for new entries (releases).
# Placed above [Unreleased] so new versions are added between marker and content.
marker-line = "<!-- insertion marker -->"

# GitHub integration for link generation (issue/PR refs in commit messages)
provider = "github"

# Parse Git trailers in commit messages (Closes #123, Refs #456, etc.)
parse-trailers = true

# Parse GitHub-style references (#123, fixes #456, etc. in commit messages)
parse-refs = true
