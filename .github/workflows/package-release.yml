name: Package release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

jobs:
  build_packages:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pump_variant:
          - with-pump
          - nopump
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: ConorMacBride/install-package@v1
        with:
          apt: autoconf automake build-essential elfutils fakeroot libpopt-dev pkg-config python3-dev python3-setuptools rpm alien
      - name: Derive release metadata
        id: meta
        shell: bash
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            version="${GITHUB_REF_NAME#v}"
            release_title="distcc-ng ${version}"
          else
            version="manual-${GITHUB_RUN_NUMBER}"
            release_title="distcc-ng manual-${GITHUB_RUN_NUMBER}"
          fi
          printf 'version=%s\n' "$version" >> "$GITHUB_OUTPUT"
          printf 'tag_name=%s\n' "${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          printf 'release_title=%s\n' "$release_title" >> "$GITHUB_OUTPUT"
          printf 'image_prefix=%s\n' "ghcr.io/${GITHUB_REPOSITORY_OWNER}/distcc-ng" >> "$GITHUB_OUTPUT"
      - name: Build non-zstd release packages
        shell: bash
        run: |
          ./scripts/build-release-packages.sh
      - name: Generate build attestation
        uses: actions/attest@c32b4b8b198b65d0bd9d63490e847ff7b53989d4
        with:
          subject-path: |
            distcc-*.tar.gz
            distcc-*.tar.bz2
            packaging/*.rpm
            packaging/*.deb
      - name: Publish container image
        if: github.ref_type == 'tag'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          IMAGE_PREFIX: ${{ steps.meta.outputs.image_prefix }}
          VERSION_LABEL: ${{ steps.meta.outputs.version }}
          VCS_REF: ${{ github.sha }}
          PUMP_VARIANT: ${{ matrix.pump_variant }}
        run: |
          printf '%s\n' "${GH_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin
          IMAGE_TAG="${IMAGE_PREFIX}:${VERSION_LABEL}-${PUMP_VARIANT}"
          IMAGE_TAG_V="${IMAGE_PREFIX}:v${VERSION_LABEL}-${PUMP_VARIANT}"
          if [ "${GITHUB_REF_TYPE}" != "tag" ]; then
            IMAGE_TAG_V="${IMAGE_TAG}"
          fi

          docker build \
            --file docker/allinkl/Dockerfile \
            --build-arg "VCS_REF=${VCS_REF}" \
            --build-arg "VERSION=${VERSION_LABEL}" \
            --build-arg "PUMP_VARIANT=${PUMP_VARIANT}" \
            --tag "${IMAGE_TAG}" \
            --tag "${IMAGE_TAG_V}" \
            .
          docker push "${IMAGE_TAG}"
          if [ "${IMAGE_TAG_V}" != "${IMAGE_TAG}" ]; then
            docker push "${IMAGE_TAG_V}"
          fi
      - name: Publish GitHub release
        if: github.ref_type == 'tag'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          IMAGE_PREFIX: ${{ steps.meta.outputs.image_prefix }}
          RELEASE_TITLE: ${{ steps.meta.outputs.release_title }}
          TAG_NAME: ${{ steps.meta.outputs.tag_name }}
          VERSION_LABEL: ${{ steps.meta.outputs.version }}
        run: |
          shopt -s nullglob
          assets=(distcc-*.tar.gz distcc-*.tar.bz2 packaging/*.rpm packaging/*.deb)
          notes_file="$(mktemp)"
          printf '%s\n' "distcc-ng release from ${GITHUB_SHA}." > "${notes_file}"
          printf '\nContainer image tags:\n' >> "${notes_file}"
          for variant in with-pump nopump; do
            if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
              printf '- %s\n' "${IMAGE_PREFIX}:${VERSION_LABEL}-${variant}" >> "${notes_file}"
              printf '- %s\n' "${IMAGE_PREFIX}:v${VERSION_LABEL}-${variant}" >> "${notes_file}"
            else
              printf '- %s\n' "${IMAGE_PREFIX}:${VERSION_LABEL}-${variant}" >> "${notes_file}"
            fi
          done

          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            gh release upload "${TAG_NAME}" "${assets[@]}" --clobber
            gh release edit "${TAG_NAME}" --title "${RELEASE_TITLE}" --notes-file "${notes_file}"
          else
            gh release create "${TAG_NAME}" "${assets[@]}" --title "${RELEASE_TITLE}" --notes-file "${notes_file}"
          fi
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: distcc-release-packages-nozstd
          path: |
            distcc-*.tar.gz
            distcc-*.tar.bz2
            packaging/*.rpm
            packaging/*.deb
