name: actionlint

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  # No path filter (removed 2026-07-24, refs #267/#336): action-lint is
  # required by master's branch ruleset, and a required check that's
  # skipped by a path filter rather than actually running permanently
  # blocks merging any PR whose diff doesn't happen to match -- confirmed
  # live on PR #336 (a README-only change). Both jobs here are cheap
  # (well under a minute each against the pinned, already-cached
  # buildtools image), so running them unconditionally on every PR/push
  # costs little and keeps every required check genuinely present.
  pull_request:
  push:
    # Was "main", which has never existed in this repo (only current_dev/
    # master) -- this trigger had never once fired. Found 2026-07-16 via a
    # lancache-ng CI-cost comparison.
    branches:
      - current_dev
      - master

permissions:
  contents: read
  pull-requests: write

jobs:
  action-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Check workflow files
        shell: bash
        run: |
          bash <(curl https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          # shellcheck disable=SC2046
          # release.yml may be later generated by cargo-dist so is excluded
          ./actionlint -color $(find .github/workflows -name '*.yml' -type f ! -name release.yml -print)
